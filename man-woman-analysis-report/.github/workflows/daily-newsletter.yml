name: Daily Newsletter Automation

on:
  schedule:
    # Every 2 hours from 06:00 to 20:00 KST (21:00, 23:00, 01:00, 03:00, 05:00, 07:00, 09:00, 11:00 UTC)
    - cron: '0 21,23,1,3,5,7,9,11 * * *'
  
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  trigger-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Generate API
        run: |
          curl -X POST https://man-woman-analysis-report.vercel.app/api/newsletter/generate \
            -H "Content-Type: application/json" \
            -d '{}'
