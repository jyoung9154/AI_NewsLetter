name: Daily Newsletter Automation

on:
  schedule:
    # 21:00 UTC (6 AM KST) and 09:00 UTC (6 PM KST)
    - cron: '0 9,21 * * *'
  
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  trigger-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Generate API
        run: |
          curl -X POST https://man-woman-analysis-report.vercel.app/api/newsletter/generate \
            -H "Content-Type: application/json" \
            -d '{}'
