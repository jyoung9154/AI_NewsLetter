name: Daily Newsletter Automation

on:
  schedule:
    - cron: '0 21,23,1,3,5,7,9,11 * * *'
  
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  trigger-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './man-woman-analysis-report/package-lock.json'

      - name: Install Dependencies
        working-directory: ./man-woman-analysis-report
        run: npm ci

      - name: Generate AI Newsletter
        working-directory: ./man-woman-analysis-report
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          NEXT_PUBLIC_COUPANG_AFFILIATE_ID: ${{ secrets.NEXT_PUBLIC_COUPANG_AFFILIATE_ID }}
        run: node scripts/generate-newsletter.mjs
