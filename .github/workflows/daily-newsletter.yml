name: Daily Newsletter Automation

on:
  schedule:
    # 22:30 UTC = 매일 아침 7시 30분 KST (트래픽 분산을 위해 분 단위 조정)
    # - cron: '30 22 * * *'
    # 임시 테스트: 오늘 9시 전까지 5분마다 (23:00~23:59 UTC 동안 5분 간격)
    - cron: '*/5 23 * * *'

    - cron: '30 * * * *' # 매 시 30분마다 실행
  
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  trigger-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './man-woman-analysis-report/package-lock.json'

      - name: Install Dependencies
        working-directory: ./man-woman-analysis-report
        run: npm ci

      - name: Generate AI Newsletter (Auto-Retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 300 # 5분 간격
          command: |
            cd ./man-woman-analysis-report
            node scripts/generate-newsletter.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          NEXT_PUBLIC_COUPANG_AFFILIATE_ID: ${{ secrets.NEXT_PUBLIC_COUPANG_AFFILIATE_ID }}

      - name: Send Alert on Failure
        if: failure()
        working-directory: ./man-woman-analysis-report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          node -e "
            const nodemailer = require('nodemailer');
            const transporter = nodemailer.createTransport({
              host: process.env.SMTP_HOST || 'smtp.gmail.com',
              port: parseInt(process.env.SMTP_PORT) || 465,
              secure: true,
              auth: { user: process.env.SMTP_USER, pass: process.env.SMTP_PASS }
            });
            transporter.sendMail({
              from: '\"System Alert\" <'+process.env.SMTP_USER+'>',
              to: process.env.SMTP_USER,
              subject: '🚨 [긴급] (생성 실패) 남녀 심리 뉴스레터 AI 생성 봇 작동 에러',
              text: '크론잡(daily-newsletter.yml)이 3회 재시도에도 불구하고 실패했습니다. GitHub Actions 로그를 확인해주세요.'
            }).then(() => console.log('Alert sent')).catch(e => console.error(e));
          "
