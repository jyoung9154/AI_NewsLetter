name: Daily Newsletter Dispatch

on:
  schedule:
    # 23:05 UTC = 매일 아침 8시 5분 KST (정각에는 GitHub Actions 큐가 밀려 누락/지연될 수 있음)
    - cron: '05 23 * * *'
  
  workflow_dispatch: # Allow manual trigger

jobs:
  dispatch-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './man-woman-analysis-report/package-lock.json'

      - name: Install Dependencies
        working-directory: ./man-woman-analysis-report
        run: npm ci

      - name: Broadcast Newsletters
        working-directory: ./man-woman-analysis-report
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/send-newsletter.mjs
